<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Encarbonadas · Admin</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --charcoal: #1a1a1a; --charcoal-light: #2d2d2d; --charcoal-lighter: #3d3d3d;
            --amber: #e67e22; --amber-dark: #d35400; --amber-glow: rgba(230,126,34,0.25);
            --cream: #fdf5e6; --white: #fff; --shadow: 0 8px 32px rgba(0,0,0,0.3);
            --radius: 16px; --radius-sm: 8px;
        }
        body { font-family: 'Inter', sans-serif; background: var(--charcoal); color: var(--cream); min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .app { max-width: 1200px; width: 100%; flex: 1; }
        .header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 16px 24px; background: var(--charcoal-light);
            border-radius: var(--radius); box-shadow: var(--shadow);
            margin-bottom: 28px; border: 1px solid rgba(255,255,255,0.04);
            flex-wrap: wrap; gap: 12px;
        }
        .header-brand { display: flex; align-items: center; gap: 12px; }
        .header-brand .logo-icon { font-size: 28px; color: var(--amber); }
        .header-brand h1 { font-family: 'Playfair Display', serif; font-size: 26px; font-weight: 700; color: var(--cream); }
        .header-brand h1 span { color: var(--amber); }
        .btn {
            display: inline-flex; align-items: center; gap: 8px; padding: 10px 24px;
            border: none; border-radius: 50px; font-size: 14px; font-weight: 600;
            cursor: pointer; transition: 0.25s ease; font-family: 'Inter', sans-serif;
            text-decoration: none; background: var(--charcoal-lighter); color: var(--cream);
            border: 1px solid rgba(255,255,255,0.06);
        }
        .btn-primary { background: var(--amber); color: var(--charcoal); border-color: var(--amber); }
        .btn-primary:hover { background: var(--amber-dark); transform: translateY(-2px); }
        .btn-secondary { background: var(--charcoal-lighter); }
        .btn-secondary:hover { background: var(--charcoal-light); transform: translateY(-2px); }
        .btn-danger { background: #c0392b; color: #fff; }
        .btn-danger:hover { background: #e74c3c; }
        .btn-sm { padding: 6px 14px; font-size: 13px; }
        .admin-tabs { display: flex; gap: 8px; margin-bottom: 28px; background: var(--charcoal-light); padding: 4px; border-radius: 50px; border: 1px solid rgba(255,255,255,0.04); flex-wrap: wrap; }
        .admin-tabs button {
            background: transparent; border: none; padding: 12px 28px; border-radius: 50px;
            font-size: 15px; font-weight: 600; color: #aaa; cursor: pointer;
            transition: 0.25s ease; font-family: 'Inter', sans-serif; flex: 1 1 auto;
        }
        .admin-tabs button i { margin-right: 8px; }
        .admin-tabs button.active { background: var(--amber); color: var(--charcoal); box-shadow: 0 4px 16px var(--amber-glow); }
        .admin-tabs button:hover:not(.active) { color: var(--cream); }
        .admin-panel { display: none; animation: fadeUp 0.3s ease; }
        .admin-panel.active { display: block; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(18px); } to { opacity: 1; transform: translateY(0); } }
        .admin-form {
            background: var(--charcoal-light); border-radius: var(--radius);
            padding: 24px 28px; margin-bottom: 32px;
            border: 1px solid rgba(255,255,255,0.04);
        }
        .admin-form h4 { font-size: 18px; margin-bottom: 16px; color: var(--cream); }
        .admin-form h4 i { color: var(--amber); margin-right: 8px; }
        .form-group { margin-bottom: 14px; }
        .form-group label { display: block; font-size: 13px; font-weight: 500; color: #bbb; margin-bottom: 4px; }
        .form-group input, .form-group textarea {
            width: 100%; padding: 12px 16px; border-radius: var(--radius-sm);
            border: 1px solid rgba(255,255,255,0.08); background: var(--charcoal);
            color: var(--cream); font-size: 15px; font-family: 'Inter', sans-serif;
            transition: 0.25s ease;
        }
        .form-group input:focus, .form-group textarea:focus { outline: none; border-color: var(--amber); box-shadow: 0 0 0 3px var(--amber-glow); }
        .form-group textarea { resize: vertical; min-height: 60px; }
        .form-group input[type="file"] { padding: 10px 12px; color: #aaa; }
        .form-group input[type="file"]::file-selector-button {
            background: var(--amber); border: none; padding: 6px 16px; border-radius: 50px;
            color: var(--charcoal); font-weight: 600; cursor: pointer; font-family: 'Inter', sans-serif; margin-right: 12px;
        }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
        .form-actions { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 4px; }
        .admin-list { display: flex; flex-direction: column; gap: 12px; }
        .admin-item {
            display: flex; align-items: center; justify-content: space-between;
            background: var(--charcoal-light); padding: 14px 20px;
            border-radius: var(--radius-sm); border: 1px solid rgba(255,255,255,0.04);
            flex-wrap: wrap; gap: 10px;
        }
        .admin-item .info { flex: 1; min-width: 160px; }
        .admin-item .info .name { font-weight: 600; color: var(--cream); font-size: 16px; }
        .admin-item .info .desc { font-size: 13px; color: #aaa; }
        .admin-item .info .price { font-weight: 700; color: var(--amber); font-size: 16px; margin-left: 8px; }
        .admin-item .actions { display: flex; gap: 8px; flex-wrap: wrap; }
        .admin-item .promo-preview { width: 50px; height: 50px; object-fit: cover; border-radius: var(--radius-sm); background: var(--charcoal-lighter); margin-right: 12px; }
        .empty-state { text-align: center; padding: 30px 20px; color: #777; }
        .empty-state i { font-size: 32px; margin-bottom: 8px; opacity: 0.4; }
        .toast-container {
            position: fixed; bottom: 30px; right: 30px; z-index: 9999;
            display: flex; flex-direction: column; gap: 10px;
        }
        .toast {
            background: var(--charcoal-light); color: var(--cream); padding: 14px 24px;
            border-radius: var(--radius-sm); border-left: 4px solid var(--amber);
            box-shadow: var(--shadow); font-weight: 500; font-size: 14px;
            animation: slideIn 0.3s ease; max-width: 320px;
        }
        .toast.success { border-left-color: #2ecc71; }
        .toast.error { border-left-color: #e74c3c; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(40px); } to { opacity: 1; transform: translateX(0); } }
        .note-box {
            background: var(--charcoal-lighter); padding: 12px 18px; border-radius: var(--radius-sm);
            border-left: 4px solid var(--amber); margin-bottom: 20px; font-size: 14px; color: #bbb;
        }
        .note-box i { color: var(--amber); margin-right: 8px; }
        @media (max-width: 700px) {
            .header { flex-direction: column; text-align: center; }
            .header-brand { justify-content: center; }
            .form-row { grid-template-columns: 1fr; }
            .admin-tabs button { padding: 10px 16px; font-size: 13px; }
            .admin-form { padding: 18px; }
            .admin-item { flex-direction: column; align-items: stretch; }
            .admin-item .actions { justify-content: flex-end; }
        }
    </style>
</head>
<body>
<div class="app">
    <header class="header">
        <div class="header-brand">
            <i class="fas fa-fire logo-icon"></i>
            <h1>En<span>carbonadas</span></h1>
        </div>
        <div>
            <a href="index.html" class="btn btn-secondary"><i class="fas fa-eye"></i> Ver sitio</a>
        </div>
    </header>

    <div class="note-box">
        <i class="fas fa-info-circle"></i> 
        <strong>Modo pruebas (sin login):</strong> El panel es accesible directamente. Todas las operaciones se realizan con la clave anónima.
    </div>

    <div class="admin-tabs" id="adminTabs">
        <button class="active" data-tab="menu"><i class="fas fa-utensils"></i> Menú</button>
        <button data-tab="promos"><i class="fas fa-tags"></i> Promos</button>
    </div>

    <!-- Menú -->
    <div class="admin-panel active" id="adminPanelMenu">
        <div class="admin-form">
            <h4><i class="fas fa-plus-circle"></i> <span id="menuFormTitle">Agregar item</span></h4>
            <form id="menuForm">
                <input type="hidden" id="menuEditId" />
                <div class="form-row">
                    <div class="form-group">
                        <label for="menuName">Nombre</label>
                        <input type="text" id="menuName" placeholder="Ej: Parrillada" required />
                    </div>
                    <div class="form-group">
                        <label for="menuPrice">Precio ($)</label>
                        <input type="number" id="menuPrice" placeholder="0.00" step="0.01" min="0" required />
                    </div>
                </div>
                <div class="form-group">
                    <label for="menuDesc">Descripción</label>
                    <textarea id="menuDesc" placeholder="Breve descripción..." rows="2"></textarea>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary" id="menuSubmitBtn"><i class="fas fa-save"></i> Guardar</button>
                    <button type="button" class="btn btn-secondary" id="menuCancelBtn" style="display:none;"><i class="fas fa-times"></i> Cancelar</button>
                </div>
            </form>
        </div>
        <h4 style="margin-bottom:12px; font-weight:500; color:#bbb;"><i class="fas fa-list"></i> Items actuales</h4>
        <div id="adminMenuList" class="admin-list"></div>
    </div>

    <!-- Promos -->
    <div class="admin-panel" id="adminPanelPromos">
        <div class="admin-form">
            <h4><i class="fas fa-plus-circle"></i> <span id="promoFormTitle">Agregar promo</span></h4>
            <form id="promoForm">
                <input type="hidden" id="promoEditId" />
                <div class="form-group">
                    <label for="promoTitle">Título</label>
                    <input type="text" id="promoTitle" placeholder="Ej: 2x1 en Costillas" required />
                </div>
                <div class="form-group">
                    <label for="promoDesc">Descripción</label>
                    <textarea id="promoDesc" placeholder="Detalles..." rows="2"></textarea>
                </div>
                <div class="form-group">
                    <label for="promoImage">Imagen (se sube a Supabase)</label>
                    <input type="file" id="promoImage" accept="image/*" />
                    <div id="promoImagePreview" style="margin-top:10px; display:none;">
                        <img id="promoImagePreviewImg" src="" alt="Vista previa" style="max-height:120px; border-radius:8px; border:1px solid rgba(255,255,255,0.08);" />
                    </div>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary" id="promoSubmitBtn"><i class="fas fa-save"></i> Guardar</button>
                    <button type="button" class="btn btn-secondary" id="promoCancelBtn" style="display:none;"><i class="fas fa-times"></i> Cancelar</button>
                </div>
            </form>
        </div>
        <h4 style="margin-bottom:12px; font-weight:500; color:#bbb;"><i class="fas fa-list"></i> Promos actuales</h4>
        <div id="adminPromoList" class="admin-list"></div>
    </div>

    <footer style="margin-top:40px; text-align:center; color:#555; font-size:13px; padding:12px 0; border-top:1px solid rgba(255,255,255,0.04);">
        Panel de administración &middot; Modo pruebas
    </footer>
</div>

<div class="toast-container" id="toastContainer"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    // ─── CONFIGURACIÓN ───
    const SUPABASE_URL = 'https://qasunyqwjatdwsgxjrhf.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_k3b6ZO-zWT4L-PDbotkqhw_gMhUV7Gn';
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // ─── TOAST ───
    function toast(msg, type = 'info') {
        const c = document.getElementById('toastContainer');
        const el = document.createElement('div');
        el.className = `toast ${type}`;
        el.textContent = msg;
        c.appendChild(el);
        setTimeout(() => {
            el.style.opacity = '0';
            el.style.transform = 'translateX(40px)';
            setTimeout(() => el.remove(), 300);
        }, 2800);
    }

    // ─── CRUD MENÚ ───
    const menuForm = document.getElementById('menuForm');
    const menuName = document.getElementById('menuName');
    const menuPrice = document.getElementById('menuPrice');
    const menuDesc = document.getElementById('menuDesc');
    const menuEditId = document.getElementById('menuEditId');
    const menuSubmitBtn = document.getElementById('menuSubmitBtn');
    const menuCancelBtn = document.getElementById('menuCancelBtn');
    const menuFormTitle = document.getElementById('menuFormTitle');

    function resetMenuForm() {
        menuForm.reset();
        menuEditId.value = '';
        menuSubmitBtn.innerHTML = '<i class="fas fa-save"></i> Guardar';
        menuFormTitle.textContent = 'Agregar item';
        menuCancelBtn.style.display = 'none';
    }

    async function cargarMenu() {
        const { data, error } = await supabaseClient.from('menu').select('*').order('created_at', { ascending: true });
        if (error) { console.error(error); return []; }
        return data;
    }

    async function renderAdminMenu() {
        const list = document.getElementById('adminMenuList');
        const items = await cargarMenu();
        if (!items || items.length === 0) {
            list.innerHTML = `<div class="empty-state"><i class="fas fa-utensils"></i><p>Sin items.</p></div>`;
            return;
        }
        list.innerHTML = items.map(i => `
            <div class="admin-item" data-id="${i.id}">
                <div class="info">
                    <span class="name">${escHtml(i.nombre)}</span>
                    <span class="price">$${Number(i.precio).toFixed(2)}</span>
                    ${i.descripcion ? `<div class="desc">${escHtml(i.descripcion)}</div>` : ''}
                </div>
                <div class="actions">
                    <button class="btn btn-secondary btn-sm btn-edit-menu" data-id="${i.id}"><i class="fas fa-edit"></i></button>
                    <button class="btn btn-danger btn-sm btn-delete-menu" data-id="${i.id}"><i class="fas fa-trash"></i></button>
                </div>
            </div>
        `).join('');
        list.querySelectorAll('.btn-edit-menu').forEach(b => b.addEventListener('click', () => editMenu(b.dataset.id)));
        list.querySelectorAll('.btn-delete-menu').forEach(b => b.addEventListener('click', () => deleteMenu(b.dataset.id)));
    }

    menuForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const nombre = menuName.value.trim();
        const precio = parseFloat(menuPrice.value);
        if (!nombre || isNaN(precio) || precio < 0) { toast('Nombre y precio válido.', 'error'); return; }
        const descripcion = menuDesc.value.trim();
        const editId = menuEditId.value;
        const data = { nombre, precio, descripcion };

        if (editId) {
            const { error } = await supabaseClient.from('menu').update(data).eq('id', editId);
            if (error) { toast('Error al actualizar: ' + error.message, 'error'); return; }
            toast('Actualizado ✓', 'success');
        } else {
            const { error } = await supabaseClient.from('menu').insert([data]);
            if (error) { toast('Error al agregar: ' + error.message, 'error'); return; }
            toast('Agregado ✓', 'success');
        }
        resetMenuForm();
        renderAdminMenu();
    });

    menuCancelBtn.addEventListener('click', resetMenuForm);

    function editMenu(id) {
        cargarMenu().then(items => {
            const item = items.find(m => m.id === id);
            if (!item) return;
            menuName.value = item.nombre;
            menuPrice.value = item.precio;
            menuDesc.value = item.descripcion || '';
            menuEditId.value = item.id;
            menuSubmitBtn.innerHTML = '<i class="fas fa-edit"></i> Actualizar';
            menuFormTitle.textContent = 'Editar item';
            menuCancelBtn.style.display = 'inline-flex';
            menuName.focus();
        });
    }

    async function deleteMenu(id) {
        if (!confirm('¿Eliminar este item?')) return;
        const { error } = await supabaseClient.from('menu').delete().eq('id', id);
        if (error) { toast('Error: ' + error.message, 'error'); return; }
        toast('Eliminado', 'info');
        renderAdminMenu();
    }

    // ─── CRUD PROMOS ───
    const promoForm = document.getElementById('promoForm');
    const promoTitulo = document.getElementById('promoTitle');
    const promoDesc = document.getElementById('promoDesc');
    const promoImage = document.getElementById('promoImage');
    const promoEditId = document.getElementById('promoEditId');
    const promoSubmitBtn = document.getElementById('promoSubmitBtn');
    const promoCancelBtn = document.getElementById('promoCancelBtn');
    const promoFormTitle = document.getElementById('promoFormTitle');
    const promoImagePreview = document.getElementById('promoImagePreview');
    const promoImagePreviewImg = document.getElementById('promoImagePreviewImg');
    let selectedFile = null;

    promoImage.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) { selectedFile = null; promoImagePreview.style.display = 'none'; return; }
        selectedFile = file;
        const reader = new FileReader();
        reader.onload = (ev) => {
            promoImagePreviewImg.src = ev.target.result;
            promoImagePreview.style.display = 'block';
        };
        reader.readAsDataURL(file);
    });

    function resetPromoForm() {
        promoForm.reset();
        promoEditId.value = '';
        selectedFile = null;
        promoImagePreview.style.display = 'none';
        promoImagePreviewImg.src = '';
        promoSubmitBtn.innerHTML = '<i class="fas fa-save"></i> Guardar';
        promoFormTitle.textContent = 'Agregar promo';
        promoCancelBtn.style.display = 'none';
    }

    async function cargarPromos() {
        const { data, error } = await supabaseClient.from('promos').select('*').order('created_at', { ascending: false });
        if (error) { console.error(error); return []; }
        return data;
    }

    async function renderAdminPromos() {
        const list = document.getElementById('adminPromoList');
        const items = await cargarPromos();
        if (!items || items.length === 0) {
            list.innerHTML = `<div class="empty-state"><i class="fas fa-tags"></i><p>Sin promos.</p></div>`;
            return;
        }
        list.innerHTML = items.map(p => `
            <div class="admin-item" data-id="${p.id}">
                ${p.imagen_url ? `<img class="promo-preview" src="${p.imagen_url}" alt="${escHtml(p.titulo)}" />` :
                `<div class="promo-preview" style="display:flex;align-items:center;justify-content:center;color:#666;font-size:20px;background:var(--charcoal-lighter);border-radius:8px;width:50px;height:50px;"><i class="fas fa-image"></i></div>`}
                <div class="info">
                    <span class="name">${escHtml(p.titulo)}</span>
                    ${p.descripcion ? `<div class="desc">${escHtml(p.descripcion)}</div>` : ''}
                    ${p.fecha ? `<div class="desc" style="color:#777;font-size:12px;">${escHtml(p.fecha)}</div>` : ''}
                </div>
                <div class="actions">
                    <button class="btn btn-secondary btn-sm btn-edit-promo" data-id="${p.id}"><i class="fas fa-edit"></i></button>
                    <button class="btn btn-danger btn-sm btn-delete-promo" data-id="${p.id}"><i class="fas fa-trash"></i></button>
                </div>
            </div>
        `).join('');
        list.querySelectorAll('.btn-edit-promo').forEach(b => b.addEventListener('click', () => editPromo(b.dataset.id)));
        list.querySelectorAll('.btn-delete-promo').forEach(b => b.addEventListener('click', () => deletePromo(b.dataset.id)));
    }

    async function subirImagen(file) {
        const ext = file.name.split('.').pop();
        const fileName = `${Date.now()}.${ext}`;
        const { data, error } = await supabaseClient.storage
            .from('promos-images')
            .upload(fileName, file, { cacheControl: '3600', upsert: false });
        if (error) {
            console.error('Error subiendo imagen:', error);
            return null;
        }
        const { data: urlData } = supabaseClient.storage
            .from('promos-images')
            .getPublicUrl(fileName);
        return urlData.publicUrl;
    }

    promoForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const titulo = promoTitulo.value.trim();
        if (!titulo) { toast('Título requerido.', 'error'); return; }
        const descripcion = promoDesc.value.trim();
        const editId = promoEditId.value;
        let imagen_url = null;

        if (selectedFile) {
            const url = await subirImagen(selectedFile);
            if (url) imagen_url = url;
            else { toast('Error al subir la imagen.', 'error'); return; }
        }

        const data = { titulo, descripcion, fecha: 'Válida por tiempo limitado' };
        if (imagen_url) data.imagen_url = imagen_url;

        if (editId) {
            if (!imagen_url) {
                delete data.imagen_url;
            }
            const { error } = await supabaseClient.from('promos').update(data).eq('id', editId);
            if (error) { toast('Error al actualizar: ' + error.message, 'error'); return; }
            toast('Promo actualizada ✓', 'success');
        } else {
            const { error } = await supabaseClient.from('promos').insert([data]);
            if (error) { toast('Error al agregar: ' + error.message, 'error'); return; }
            toast('Promo agregada ✓', 'success');
        }
        resetPromoForm();
        renderAdminPromos();
    });

    promoCancelBtn.addEventListener('click', resetPromoForm);

    function editPromo(id) {
        cargarPromos().then(items => {
            const item = items.find(p => p.id === id);
            if (!item) return;
            promoTitulo.value = item.titulo;
            promoDesc.value = item.descripcion || '';
            promoEditId.value = item.id;
            if (item.imagen_url) {
                promoImagePreviewImg.src = item.imagen_url;
                promoImagePreview.style.display = 'block';
            } else {
                promoImagePreview.style.display = 'none';
            }
            promoSubmitBtn.innerHTML = '<i class="fas fa-edit"></i> Actualizar';
            promoFormTitle.textContent = 'Editar promo';
            promoCancelBtn.style.display = 'inline-flex';
            promoTitulo.focus();
        });
    }

    async function deletePromo(id) {
        if (!confirm('¿Eliminar esta promo?')) return;
        const { error } = await supabaseClient.from('promos').delete().eq('id', id);
        if (error) { toast('Error: ' + error.message, 'error'); return; }
        toast('Eliminada', 'info');
        renderAdminPromos();
    }

    // ─── TABS ───
    const adminTabs = document.querySelectorAll('#adminTabs button');
    const adminPanelMenu = document.getElementById('adminPanelMenu');
    const adminPanelPromos = document.getElementById('adminPanelPromos');

    adminTabs.forEach(tab => {
        tab.addEventListener('click', () => {
            adminTabs.forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            const target = tab.dataset.tab;
            adminPanelMenu.classList.toggle('active', target === 'menu');
            adminPanelPromos.classList.toggle('active', target === 'promos');
            if (target === 'menu') renderAdminMenu();
            else renderAdminPromos();
        });
    });

    // ─── HELPERS ───
    function escHtml(str) { if (!str) return ''; const d = document.createElement('div'); d.textContent = str; return d.innerHTML; }

    // ─── INICIO ───
    resetMenuForm();
    resetPromoForm();
    renderAdminMenu();
